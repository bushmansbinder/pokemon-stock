<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon Stock</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-100 min-h-screen p-4 pb-12 font-sans">

    <div class="max-w-md mx-auto pt-2 pb-5 text-center space-y-3">
        <h1 class="text-2xl font-black text-zinc-800 tracking-tight">Pokemon Stock</h1>
        
        <a href="https://m.me/javon.api" class="inline-flex items-center justify-center bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold py-2 px-6 rounded-full shadow-sm transition-colors">
            <svg class="w-4 h-4 mr-2 fill-current" viewBox="0 0 24 24"><path d="M12 2C6.477 2 2 6.145 2 11.259c0 2.915 1.517 5.485 3.86 7.14v3.601l3.522-1.933c.833.242 1.714.373 2.618.373 5.523 0 10-4.145 10-9.259C22 6.145 17.523 2 12 2zm1.011 12.383l-2.618-2.793-5.093 2.793 5.59-5.94 2.651 2.793 5.06-2.793-5.59 5.94z"/></svg>
            Message to Buy
        </a>
    </div>

    <div class="max-w-md mx-auto w-full space-y-3" id="inventory-list">
        </div>

    <script>
        const inventoryContainer = document.getElementById('inventory-list');

        // ⚙️ THE ENGINE
        async function loadInventory() {
            try {
                // THE CACHE BUSTER
                const cacheBuster = new Date().getTime();
                const response = await fetch(`inventory.json?v=${cacheBuster}`);
                const items = await response.json();

                // Split the items based on stock
                const inStock = items.filter(item => item.stock > 0);
                const outOfStock = items.filter(item => item.stock === 0);

                // Clear the container before loading
                inventoryContainer.innerHTML = '';

                // A reusable blueprint for drawing the cards
                function createCardHTML(item, isOutOfStock) {
                    const cardClass = isOutOfStock
                        ? "bg-white rounded-xl shadow-sm p-2.5 opacity-50 grayscale transition-all w-full"
                        : "bg-white rounded-xl shadow-sm p-2.5 transition-all w-full";

                    const stockDisplay = isOutOfStock
                        ? `<span class="text-red-600 font-black text-xl line-through decoration-2 mt-0.5">0</span>`
                        : `<span class="text-2xl font-black text-zinc-900 leading-none mt-0.5">${item.stock}</span>`;

                    return `
                        <div class="${cardClass}">
                            <h2 class="text-base font-bold text-center text-zinc-800 mb-1.5 leading-tight">${item.name}</h2>
                            
                            <div class="flex bg-zinc-50 border border-zinc-200 rounded-lg p-1.5 items-center">
                                
                                <div class="w-1/3 flex-shrink-0 p-0.5">
                                    <img src="${item.image}" alt="${item.name}" class="w-full h-auto aspect-square object-cover rounded shadow-sm bg-zinc-200">
                                </div>
                                
                                <div class="w-1/3 flex flex-col items-center justify-center border-r border-zinc-200 px-1 py-1">
                                    <span class="text-[9px] font-bold text-zinc-400 uppercase tracking-wider">Cost</span>
                                    <span class="text-2xl font-black text-emerald-600 leading-none mt-0.5">$${item.cost}</span>
                                </div>
                                
                                <div class="w-1/3 flex flex-col items-center justify-center px-1 py-1">
                                    <span class="text-[9px] font-bold text-zinc-400 uppercase tracking-wider">Stock</span>
                                    ${stockDisplay}
                                </div>
                                
                            </div>
                        </div>
                    `;
                }

                // 1. Draw all IN STOCK items first
                inStock.forEach(item => {
                    inventoryContainer.innerHTML += createCardHTML(item, false);
                });

                // 2. If there are sold out items, draw the HEADING, then the items
                if (outOfStock.length > 0) {
                    // The OUT OF STOCK Divider
                    inventoryContainer.innerHTML += `
                        <div class="pt-6 pb-1 flex items-center justify-center w-full opacity-60">
                            <div class="flex-1 h-px bg-zinc-300"></div>
                            <span class="mx-4 text-[10px] font-black text-zinc-500 uppercase tracking-[0.2em]">Out of Stock</span>
                            <div class="flex-1 h-px bg-zinc-300"></div>
                        </div>
                    `;
                    
                    // Draw the zero-stock items
                    outOfStock.forEach(item => {
                        inventoryContainer.innerHTML += createCardHTML(item, true);
                    });
                }

            } catch (error) {
                inventoryContainer.innerHTML = `<p class="text-center text-sm font-bold text-red-500">Could not load inventory.</p>`;
            }
        }

        // Run the engine when the page loads
        loadInventory();
    </script>
</body>
</html>
